name: denver-skyimage

services:
  capture:
    build: ./capture
    restart: unless-stopped
    volumes:
      - ./config.yaml:/config/config.yaml:ro,z
      - ./cameras.json:/config/cameras.json:ro,z
      - ./downloaded_images:/data/images:z

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./cameras.json:/config/cameras.json:ro,z
      - ./downloaded_images:/data/images:z
