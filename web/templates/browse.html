<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Browse — Denver Sky</title>
<style>
  body { margin: 0; background: #0b0d12; color: #e6e9ef; font-family: system-ui, sans-serif; }
  header { padding: 0.6rem 1rem; display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid #222; }
  header a { color: #8ab4ff; text-decoration: none; }
  header a:hover { text-decoration: underline; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.5rem; padding: 1rem; }
  .tile { background: #111; border: 1px solid #1c1f26; border-radius: 4px; overflow: hidden; cursor: pointer; }
  .tile img { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; }
  .tile .caption { font-size: 0.75rem; padding: 0.25rem 0.4rem; color: #aab; font-variant-numeric: tabular-nums; }
  .status { text-align: center; padding: 1rem; color: #888; }
</style>
</head>
<body>
<header>
  <strong>Denver Sky</strong>
  <a href="/">Live</a>
  <a href="/browse">Browse</a>
  <span id="counter" style="margin-left:auto;color:#888;"></span>
</header>
<div class="grid" id="grid"></div>
<div class="status" id="status">loading…</div>
<script>
const grid = document.getElementById('grid');
const status = document.getElementById('status');
const counter = document.getElementById('counter');
let page = 1;
const perPage = 60;
let total = 0;
let loading = false;
let done = false;

async function loadPage() {
  if (loading || done) return;
  loading = true;
  status.textContent = 'loading…';
  const r = await fetch(`/api/list?page=${page}&per_page=${perPage}`);
  const data = await r.json();
  total = data.total;
  counter.textContent = `${total} frames`;
  if (!data.items.length) {
    done = true;
    status.textContent = total === 0 ? 'no images yet' : 'end';
    loading = false;
    return;
  }
  for (const f of data.items) {
    const a = document.createElement('a');
    a.className = 'tile';
    a.href = `/image/${f.name}`;
    a.target = '_blank';
    a.rel = 'noopener';
    const im = document.createElement('img');
    im.loading = 'lazy';
    im.src = `/image/${f.name}`;
    im.alt = f.ts;
    const cap = document.createElement('div');
    cap.className = 'caption';
    cap.textContent = f.ts.replace('T', ' ');
    a.appendChild(im);
    a.appendChild(cap);
    grid.appendChild(a);
  }
  page++;
  loading = false;
  if (page * perPage > total + perPage) {
    done = true;
    status.textContent = 'end';
  } else {
    status.textContent = '';
  }
}

window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 600) {
    loadPage();
  }
});

loadPage();
</script>
</body>
</html>
