<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Denver Sky Timelapse</title>
<style>
  body { margin: 0; background: #0b0d12; color: #e6e9ef; font-family: system-ui, sans-serif; }
  header { padding: 0.6rem 1rem; display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid #222; }
  header a { color: #8ab4ff; text-decoration: none; }
  header a:hover { text-decoration: underline; }
  .main { display: flex; align-items: stretch; }
  .stage { flex: 1; display: flex; justify-content: center; align-items: center; padding: 1rem; background: #0b0d12; min-width: 0; }
  .stage img { max-width: 100%; max-height: 78vh; box-shadow: 0 0 20px #000; }
  .stage:fullscreen { padding: 0; }
  .stage:fullscreen img { max-height: 100vh; max-width: 100vw; box-shadow: none; }
  .sidebar { display: flex; flex-direction: column; justify-content: flex-end; gap: 0.4rem; padding: 1rem 0 1rem 1rem; min-width: 13rem; max-width: 16rem; }
  .sidebar button { width: 100%; text-align: left; font-size: 0.85rem; padding: 0.55rem 0.7rem; }
  .sidebar .preset-everything { background: #2a3b5a; }
  .sidebar .preset-today { background: #2d4a2d; }
  .camera-switcher { position: fixed; top: 0.5rem; right: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem; z-index: 100; }
  .camera-switcher button { font-size: 0.8rem; padding: 0.4rem 0.8rem; opacity: 0.6; }
  .camera-switcher button.active { opacity: 1; background: #2a3b5a; border-color: #8ab4ff; }
  .thumb-tooltip { position: fixed; transform: translate(-50%, calc(-100% - 10px)); background: rgba(20,24,32,0.95); color: #e6e9ef; padding: 0.35rem 0.65rem; border-radius: 4px; font-size: 0.85rem; white-space: nowrap; pointer-events: none; z-index: 1000; display: none; border: 1px solid #444; font-variant-numeric: tabular-nums; }
  .thumb-tooltip.show { display: block; }
  .bottombar { position: sticky; bottom: 0; background: #0b0d12; border-top: 1px solid #222; padding: 0.5rem 1rem 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .row { display: flex; gap: 0.75rem; align-items: center; }
  .row .slot { flex: 1; min-width: 0; }
  .slabel { font-size: 0.75rem; color: #8ab4ff; min-width: 6rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  input[type=range] { width: 100%; min-width: 0; }
  button { background: #1f2630; color: #e6e9ef; border: 1px solid #333; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; }
  button:hover { background: #2a3340; }
  .ts { font-variant-numeric: tabular-nums; min-width: 18ch; font-size: 0.8rem; }
  label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; }
  .rangebar { width: 100%; }
  .rangebar .ticks { display: flex; justify-content: space-between; font-size: 0.7rem; color: #788; margin-bottom: 0.15rem; font-variant-numeric: tabular-nums; }
  .rangebar .anchors { position: relative; height: 14px; font-size: 0.6rem; color: #99a; font-variant-numeric: tabular-nums; pointer-events: none; }
  .rangebar .anchors span { position: absolute; transform: translateX(-50%); white-space: nowrap; }
  .rangebar .dual { position: relative; height: 24px; }
  .rangebar .track { position: absolute; top: 10px; left: 0; right: 0; height: 4px; background: #1f2630; border-radius: 2px; }
  .rangebar .selected { position: absolute; top: 0; height: 100%; background: #8ab4ff; border-radius: 2px; }
  .rangebar .daymarks { position: absolute; top: 6px; left: 0; right: 0; height: 12px; pointer-events: none; }
  .rangebar .daymarks span { position: absolute; top: 0; width: 1px; height: 12px; background: #455; }
  .rangebar input[type=range] { position: absolute; top: 4px; left: 0; width: 100%; height: 16px; background: transparent; appearance: none; pointer-events: none; margin: 0; }
  .rangebar input[type=range]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #e6e9ef; border: 2px solid #8ab4ff; cursor: pointer; pointer-events: auto; }
  .rangebar input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #e6e9ef; border: 2px solid #8ab4ff; cursor: pointer; pointer-events: auto; }
  .rangebar input[type=range]::-webkit-slider-runnable-track { background: transparent; }
  .rangebar input[type=range]::-moz-range-track { background: transparent; }
</style>
</head>
<body>
<header>
  <strong>Denver Sky</strong>
  <a href="/">Live</a>
  <a href="/touch">Touch</a>
  <a href="/browse">Browse</a>
  <a id="saveLink" href="/save">Save MP4</a>
  <select id="daySel" title="Day"></select>
  <a id="saveDay" href="#">Save Day Video</a>
</header>
<div class="camera-switcher" id="cameraSwitcher"></div>
<div class="thumb-tooltip" id="thumbTooltip"></div>
<div class="main">
  <div class="sidebar" id="rangePresets"></div>
  <div class="stage"><img id="frame" alt="sky"></div>
</div>
<div class="bottombar">
  <div class="row">
    <span class="slabel">Range</span>
    <div class="slot">
      <div class="rangebar">
        <div class="ticks">
          <span id="rangeStartLabel">--</span>
          <span id="rangeEndLabel">--</span>
        </div>
        <div class="anchors" id="anchorLabels"></div>
        <div class="dual">
          <div class="track"><div class="selected" id="selBar"></div></div>
          <div class="daymarks" id="dayMarks"></div>
          <input type="range" id="rangeMin" min="0" max="0" value="0">
          <input type="range" id="rangeMax" min="0" max="0" value="0">
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <span class="slabel">Playback</span>
    <button id="playBtn">Pause</button>
    <span class="ts" id="tsLabel">--</span>
    <div class="slot"><input type="range" id="seek" min="0" max="0" value="0"></div>
    <label>FPS <input type="number" id="fps" value="10" min="1" max="60" style="width: 4em;"></label>
    <button id="fsBtn" title="Fullscreen">⛶</button>
  </div>
</div>
<script>
const SERVER_CAMERA = {% if camera_name %}{{ camera_name | tojson }}{% else %}null{% endif %};
const urlParams = new URLSearchParams(window.location.search);
const CAMERA = SERVER_CAMERA || urlParams.get('camera') || urlParams.get('cam') || '';
const camQS = CAMERA ? `camera=${encodeURIComponent(CAMERA)}` : '';
function withCam(url) {
  if (!CAMERA) return url;
  return url + (url.includes('?') ? '&' : '?') + camQS;
}
function imgUrl(name, extra = '') {
  let u = `/image/${name}`;
  const parts = [];
  if (CAMERA) parts.push(camQS);
  if (extra) parts.push(extra);
  if (parts.length) u += '?' + parts.join('&');
  return u;
}
let frames = [];
let idx = 0;
let playing = true;
let timer = null;

const img = document.getElementById('frame');
const seek = document.getElementById('seek');
const tsLabel = document.getElementById('tsLabel');
const playBtn = document.getElementById('playBtn');
const fpsInput = document.getElementById('fps');
const saveLink = document.getElementById('saveLink');
const daySel = document.getElementById('daySel');
const saveDay = document.getElementById('saveDay');
const fsBtn = document.getElementById('fsBtn');
const stage = document.querySelector('.stage');
const rangePresets = document.getElementById('rangePresets');
const thumbTooltip = document.getElementById('thumbTooltip');

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function formatTs(iso) {
  if (!iso) return '';
  const [d, t = '00:00:00'] = iso.split('T');
  const [, mo, dd] = d.split('-');
  const [hh, mm, ss] = t.split(':');
  let h = parseInt(hh, 10);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${MONTHS[parseInt(mo,10)-1]} ${parseInt(dd,10)}, ${h}:${mm}:${ss} ${ampm}`;
}
function showThumbTooltip(idx, clientX, anchorEl) {
  if (!frames.length) return;
  thumbTooltip.textContent = formatTs(frames[idx].ts);
  const rect = anchorEl.getBoundingClientRect();
  thumbTooltip.style.left = `${clientX}px`;
  thumbTooltip.style.top = `${rect.top}px`;
  thumbTooltip.classList.add('show');
}
function hideThumbTooltip() { thumbTooltip.classList.remove('show'); }
const rangeMin = document.getElementById('rangeMin');
const rangeMax = document.getElementById('rangeMax');
const selBar = document.getElementById('selBar');
const dayMarks = document.getElementById('dayMarks');
const anchorLabels = document.getElementById('anchorLabels');
const rangeStartLabel = document.getElementById('rangeStartLabel');
const rangeEndLabel = document.getElementById('rangeEndLabel');

let anchors = [];
let sunTimes = {};
let shiftDown = false;
let rangeLo = 0;
let rangeHi = 0;

function toggleFullscreen() {
  const el = stage;
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
  }
}

fsBtn.addEventListener('click', toggleFullscreen);
stage.addEventListener('click', (e) => {
  if (e.target.closest('button, input, select, a')) return;
  toggleFullscreen();
});
stage.style.cursor = 'pointer';

document.addEventListener('keydown', (e) => {
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'SELECT' || t.tagName === 'TEXTAREA')) return;
  if (e.key === 'f' || e.key === 'F') {
    e.preventDefault();
    toggleFullscreen();
  } else if (e.key === 'p' || e.key === 'P' || e.key === ' ') {
    e.preventDefault();
    playing = !playing;
    playBtn.textContent = playing ? 'Pause' : 'Play';
  }
});

async function loadFrames() {
  const r = await fetch(withCam('/api/frames'));
  const data = await r.json();
  const prevLen = frames.length;
  const wasAtEnd = rangeHi === Math.max(0, prevLen - 1);
  frames = data;
  const max = Math.max(0, frames.length - 1);
  seek.max = max;
  rangeMin.max = max;
  rangeMax.max = max;
  computeAnchors();
  if (prevLen === 0) {
    rangeLo = 0;
    rangeHi = max;
    idx = max;
  } else if (wasAtEnd) {
    rangeHi = max;
  }
  applyRangeUI();
  updateSaveLink();
  if (lastHourLock) applyLastHour(false);
  buildPresets();
}

function findIdxNearTime(dayIndices, hhmm) {
  const [th, tm] = hhmm.split(':').map(Number);
  const target = th * 60 + tm;
  let best = -1, bestDiff = Infinity;
  for (const i of dayIndices) {
    const [hh, mm] = frames[i].ts.slice(11).split(':').map(Number);
    const diff = Math.abs(hh * 60 + mm - target);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  }
  return bestDiff <= 120 ? best : -1;
}

let lastHourLock = false;

function applyPreset(lo, hi) {
  lastHourLock = false;
  rangeLo = lo;
  rangeHi = hi;
  applyRangeUI();
  resumeFromStart();
}

function computeLastHourIdx() {
  if (frames.length < 2) return -1;
  const lastTsMs = new Date(frames[frames.length - 1].ts).getTime();
  const targetMs = lastTsMs - 60 * 60 * 1000;
  for (let i = frames.length - 1; i >= 0; i--) {
    if (new Date(frames[i].ts).getTime() <= targetMs) return i;
  }
  return -1;
}

function applyLastHour(fromClick) {
  const idxLo = computeLastHourIdx();
  if (idxLo < 0 || idxLo >= frames.length - 1) return;
  rangeLo = idxLo;
  rangeHi = frames.length - 1;
  applyRangeUI();
  if (fromClick) resumeFromStart();
}

function buildPresets() {
  rangePresets.innerHTML = '';
  if (!frames.length) return;

  const allBtn = document.createElement('button');
  allBtn.className = 'preset-everything';
  allBtn.textContent = 'Everything';
  allBtn.addEventListener('click', () => applyPreset(0, frames.length - 1));
  rangePresets.appendChild(allBtn);

  const byDay = {};
  frames.forEach((f, i) => {
    const day = f.ts.slice(0, 10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(i);
  });
  const days = Object.keys(byDay).sort();
  const todayKey = days[days.length - 1];

  for (const day of days) {
    const sun = sunTimes[day] || {};
    if (!sun.sunrise) continue;
    const sunriseIdx = findIdxNearTime(byDay[day], sun.sunrise);
    if (sunriseIdx < 0) continue;

    let hi, label, cls = '';
    const md = day.slice(5);
    if (day === todayKey) {
      hi = frames.length - 1;
      label = `Today (${md}): sunrise → NOW`;
      cls = 'preset-today';
    } else if (sun.sunset) {
      const sunsetIdx = findIdxNearTime(byDay[day], sun.sunset);
      if (sunsetIdx < 0) continue;
      hi = sunsetIdx;
      const daysAgo = days.length - 1 - days.indexOf(day);
      const prefix = daysAgo === 1 ? 'Yesterday' : `${daysAgo} days ago`;
      label = `${prefix} (${md}): sunrise → sunset`;
    } else continue;

    const btn = document.createElement('button');
    if (cls) btn.className = cls;
    btn.textContent = label;
    btn.addEventListener('click', () => applyPreset(sunriseIdx, hi));
    rangePresets.appendChild(btn);
  }

  const hourIdx = computeLastHourIdx();
  if (hourIdx >= 0 && hourIdx < frames.length - 1) {
    const startLabel = frames[hourIdx].ts.slice(11, 16);
    const hourBtn = document.createElement('button');
    hourBtn.className = 'preset-today';
    const lockGlyph = lastHourLock ? '🔒 ' : '';
    hourBtn.textContent = `${lockGlyph}Last hour (${startLabel} → NOW)`;
    hourBtn.addEventListener('click', () => {
      if (lastHourLock) {
        lastHourLock = false;
        buildPresets();
        return;
      }
      lastHourLock = true;
      applyLastHour(true);
      buildPresets();
    });
    rangePresets.appendChild(hourBtn);
  }
}

function computeAnchors() {
  anchors = [];
  if (!frames.length) { renderAnchors(); return; }
  const byDay = {};
  frames.forEach((f, i) => {
    const day = f.ts.slice(0, 10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push({ i, ts: f.ts });
  });
  for (const day of Object.keys(byDay)) {
    const monthDay = day.slice(5);
    const sun = sunTimes[day] || {};
    const targets = [{ time: '00:00', suffix: '' }];
    if (sun.sunrise) targets.push({ time: sun.sunrise, suffix: ` sunrise ${sun.sunrise}` });
    if (sun.sunset) targets.push({ time: sun.sunset, suffix: ` sunset ${sun.sunset}` });
    for (const t of targets) {
      const [th, tm] = t.time.split(':').map(Number);
      const targetMin = th * 60 + tm;
      let best = null, bestDiff = Infinity;
      for (const f of byDay[day]) {
        const [hh, mm] = f.ts.slice(11).split(':').map(Number);
        const min = hh * 60 + mm;
        const diff = Math.abs(min - targetMin);
        if (diff < bestDiff) { bestDiff = diff; best = f; }
      }
      if (best && bestDiff <= 120) {
        anchors.push({ idx: best.i, label: monthDay + t.suffix });
      }
    }
  }
  anchors.sort((a, b) => a.idx - b.idx);
  renderAnchors();
}

async function loadSunTimes() {
  try {
    const r = await fetch(withCam('/api/anchors'));
    const data = await r.json();
    sunTimes = {};
    for (const d of data) sunTimes[d.day] = { sunrise: d.sunrise, sunset: d.sunset };
  } catch (e) {
    console.warn('sun times failed', e);
  }
}

function renderAnchors() {
  dayMarks.innerHTML = '';
  anchorLabels.innerHTML = '';
  if (frames.length < 2) return;
  const total = frames.length - 1;
  for (const a of anchors) {
    const pct = (a.idx / total) * 100;
    const m = document.createElement('span');
    m.style.left = `${pct}%`;
    dayMarks.appendChild(m);
    const lbl = document.createElement('span');
    lbl.style.left = `${pct}%`;
    lbl.textContent = a.label;
    lbl.title = frames[a.idx].ts.replace('T', ' ');
    anchorLabels.appendChild(lbl);
  }
}

function snapToDay(val) {
  if (shiftDown || frames.length < 2) return val;
  const tol = Math.max(2, Math.floor(frames.length * 0.01));
  for (const a of anchors) {
    if (Math.abs(val - a.idx) <= tol) return a.idx;
  }
  return val;
}

function applyRangeUI() {
  if (frames.length < 2) {
    selBar.style.left = '0%';
    selBar.style.width = '100%';
    rangeStartLabel.textContent = '--';
    rangeEndLabel.textContent = '--';
    return;
  }
  rangeMin.value = rangeLo;
  rangeMax.value = rangeHi;
  const total = frames.length - 1;
  const loPct = (rangeLo / total) * 100;
  const hiPct = (rangeHi / total) * 100;
  selBar.style.left = `${loPct}%`;
  selBar.style.width = `${hiPct - loPct}%`;
  rangeStartLabel.textContent = frames[rangeLo].ts.replace('T', ' ');
  const atCurrent = rangeHi === frames.length - 1;
  rangeEndLabel.textContent = atCurrent
    ? `NOW (${frames[rangeHi].ts.replace('T', ' ')})`
    : frames[rangeHi].ts.replace('T', ' ');
  rangeEndLabel.style.color = atCurrent ? '#7fd17a' : '#788';
  seek.min = rangeLo;
  seek.max = rangeHi;
  if (idx < rangeLo) idx = rangeLo;
  if (idx > rangeHi) idx = rangeHi;
  updateSaveLink();
}

rangeMin.addEventListener('input', () => {
  let v = parseInt(rangeMin.value, 10);
  v = snapToDay(v);
  if (v >= rangeHi) v = Math.max(0, rangeHi - 1);
  rangeLo = v;
  playing = false;
  playBtn.textContent = 'Play';
  applyRangeUI();
  show(rangeLo);
});

rangeMax.addEventListener('input', () => {
  let v = parseInt(rangeMax.value, 10);
  v = snapToDay(v);
  if (v <= rangeLo) v = Math.min(frames.length - 1, rangeLo + 1);
  rangeHi = v;
  playing = false;
  playBtn.textContent = 'Play';
  applyRangeUI();
  show(rangeHi);
});

function resumeFromStart() {
  idx = rangeLo;
  show(idx);
  playing = true;
  playBtn.textContent = 'Pause';
}

rangeMin.addEventListener('change', resumeFromStart);
rangeMax.addEventListener('change', resumeFromStart);

const dual = document.querySelector('.rangebar .dual');
let activeThumb = null;

function pointerToFrame(clientX, rect) {
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  return Math.round(pct * (frames.length - 1));
}

function updateActiveThumb(target) {
  let v = snapToDay(target);
  if (activeThumb === 'lo') {
    if (v >= rangeHi) v = Math.max(0, rangeHi - 1);
    rangeLo = v;
    show(rangeLo);
  } else {
    if (v <= rangeLo) v = Math.min(frames.length - 1, rangeLo + 1);
    rangeHi = v;
    show(rangeHi);
  }
  applyRangeUI();
}

dual.addEventListener('pointerdown', (e) => {
  if (!frames.length) return;
  if (e.target.tagName === 'INPUT') return;
  const rect = dual.getBoundingClientRect();
  const target = pointerToFrame(e.clientX, rect);
  const selSize = Math.max(1, rangeHi - rangeLo);
  const endTol = Math.max(2, Math.floor(selSize * 0.20));
  activeThumb = (target > rangeHi || target >= rangeHi - endTol) ? 'hi' : 'lo';
  playing = false;
  playBtn.textContent = 'Play';
  try { dual.setPointerCapture(e.pointerId); } catch {}
  updateActiveThumb(target);
  showThumbTooltip(activeThumb === 'hi' ? rangeHi : rangeLo, e.clientX, dual);

  const onMove = (ev) => {
    if (!activeThumb) return;
    const r = dual.getBoundingClientRect();
    updateActiveThumb(pointerToFrame(ev.clientX, r));
    showThumbTooltip(activeThumb === 'hi' ? rangeHi : rangeLo, ev.clientX, dual);
  };
  const onUp = () => {
    activeThumb = null;
    hideThumbTooltip();
    dual.removeEventListener('pointermove', onMove);
    dual.removeEventListener('pointerup', onUp);
    dual.removeEventListener('pointercancel', onUp);
    resumeFromStart();
  };
  dual.addEventListener('pointermove', onMove);
  dual.addEventListener('pointerup', onUp);
  dual.addEventListener('pointercancel', onUp);
});

function seekTooltipUpdate(ev) {
  const r = seek.getBoundingClientRect();
  const max = parseInt(seek.max, 10) || frames.length - 1;
  const min = parseInt(seek.min, 10) || 0;
  const v = parseInt(seek.value, 10);
  const denom = Math.max(1, max - min);
  const x = r.left + ((v - min) / denom) * r.width;
  showThumbTooltip(v, ev?.clientX ?? x, seek);
}
seek.addEventListener('pointerdown', (e) => {
  seekTooltipUpdate(e);
});
seek.addEventListener('input', (e) => seekTooltipUpdate(e));
seek.addEventListener('pointerup', hideThumbTooltip);
seek.addEventListener('pointercancel', hideThumbTooltip);
seek.addEventListener('change', hideThumbTooltip);

document.addEventListener('keydown', (e) => { if (e.key === 'Shift') shiftDown = true; });
document.addEventListener('keyup', (e) => { if (e.key === 'Shift') shiftDown = false; });

function updateSaveLink() {
  const fps = parseInt(fpsInput.value, 10) || 10;
  let saveUrl = `/save?fps=${fps}`;
  if (frames.length && (rangeLo > 0 || rangeHi < frames.length - 1)) {
    const s = frames[rangeLo].ts.replace('T', '_').replace(/:/g, '-');
    const e = frames[rangeHi].ts.replace('T', '_').replace(/:/g, '-');
    saveUrl += `&start=${s}&end=${e}`;
  }
  saveLink.href = withCam(saveUrl);
  const day = daySel.value;
  if (day) {
    saveDay.href = withCam(`/save?fps=${fps}&start=${day}_00-00-00&end=${day}_23-59-59`);
  } else {
    saveDay.href = '#';
  }
}

async function loadDays() {
  const r = await fetch(withCam('/api/days'));
  const days = await r.json();
  const prev = daySel.value;
  daySel.innerHTML = '';
  for (const d of days) {
    const opt = document.createElement('option');
    opt.value = d.day;
    opt.textContent = `${d.day} (${d.count})`;
    daySel.appendChild(opt);
  }
  if (prev && [...daySel.options].some(o => o.value === prev)) {
    daySel.value = prev;
  }
  updateSaveLink();
}

daySel.addEventListener('change', updateSaveLink);

function show(i) {
  if (!frames.length) return;
  idx = Math.max(rangeLo, Math.min(rangeHi, i));
  const f = frames[idx];
  img.src = imgUrl(f.name);
  tsLabel.textContent = f.ts.replace('T', ' ');
  seek.value = idx;
}

function tick() {
  if (!playing || !frames.length) return;
  if (idx >= rangeHi) {
    idx = rangeLo;
  } else {
    idx++;
  }
  show(idx);
}

function restartTimer() {
  if (timer) clearInterval(timer);
  const fps = Math.max(1, Math.min(60, parseInt(fpsInput.value, 10) || 10));
  timer = setInterval(tick, 1000 / fps);
}

playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? 'Pause' : 'Play';
});

seek.addEventListener('input', () => {
  playing = false;
  playBtn.textContent = 'Play';
  show(parseInt(seek.value, 10));
});

seek.addEventListener('change', () => {
  playing = true;
  playBtn.textContent = 'Pause';
});

fpsInput.addEventListener('change', () => {
  playing = true;
  playBtn.textContent = 'Pause';
  restartTimer();
  updateSaveLink();
});

async function buildCameraSwitcher(alwaysShow) {
  try {
    const r = await fetch('/api/cameras');
    const data = await r.json();
    const cams = data.cameras || [];
    const def = data.default;
    if (cams.length <= 1 && !alwaysShow) return;
    const container = document.getElementById('cameraSwitcher');
    container.innerHTML = '';
    const active = CAMERA || def;
    for (const name of cams) {
      const btn = document.createElement('button');
      btn.textContent = name;
      if (name === active) btn.classList.add('active');
      btn.addEventListener('click', () => {
        if (name === active) return;
        window.location.href = `/camera/${encodeURIComponent(name)}`;
      });
      container.appendChild(btn);
    }
  } catch (e) { console.warn('camera switcher failed', e); }
}

(async () => {
  await buildCameraSwitcher(true);
  await loadSunTimes();
  await loadFrames();
  await loadDays();
  if (frames.length) show(idx);
  restartTimer();
  setInterval(async () => { await loadSunTimes(); await loadFrames(); }, 30000);
  setInterval(loadDays, 60000);
})();
