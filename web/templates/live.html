<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Denver Sky — Live</title>
<style>
  * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: #0b0d12; color: #e6e9ef; font-family: system-ui, sans-serif; overflow: hidden; }
  body { display: flex; flex-direction: column; }
  .main { flex: 1; display: flex; align-items: stretch; min-height: 0; }
  .sidebar { position: relative; z-index: 10; display: flex; flex-direction: column; justify-content: flex-end; gap: 0.5rem; padding: 1rem 0 1rem 1rem; min-width: 16rem; max-width: 20rem; }
  .sidebar button { width: calc(100% - 14px); text-align: left; font-size: 1.05rem; padding: 0.85rem 1rem; min-width: 0; transition: transform 0.18s ease-out, filter 0.18s ease-out; }
  .sidebar button.active { transform: translateX(14px); filter: brightness(1.25); }
  .sidebar .preset-everything { background: #2a3b5a; }
  .sidebar .preset-today { background: #2d4a2d; }
  .sidebar .preset-sunrise { border-color: #d6a14b; }
  .sidebar .preset-day { border-color: #6a7c8a; }
  .sidebar .preset-sunset { border-color: #c2614e; }
  .sidebar .preset-night { border-color: #3a4f7a; background: #161a26; }
  .sidebar .preset-event { border-color: #ffd76a; background: #2a2515; }
  .rangebar .daymarks span.event-mark { background: #ffd76a; width: 3px; box-shadow: 0 0 4px rgba(255,215,106,0.6); }
  .rangebar .anchors span.event-anchor { color: #ffd76a; font-weight: 600; }
  .stage { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; padding: 0; background: #0b0d12; cursor: pointer; min-height: 0; min-width: 0; }
  .fs-hint { position: absolute; top: 1rem; right: 1rem; width: 110px; height: 110px; color: #e6e9ef; opacity: 0.45; pointer-events: none; animation: fsPulse 2.4s ease-in-out infinite; filter: drop-shadow(0 0 8px rgba(0,0,0,0.7)); transition: top 0.15s, right 0.15s; }
  .time-label { position: absolute; top: 1rem; right: 1rem; display: block; background: rgba(10,15,20,0.55); border: 2px solid rgba(255,255,255,0.4); border-radius: 14px; padding: 0.9rem 1.5rem; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.7); pointer-events: none; backdrop-filter: blur(4px); letter-spacing: 0.02em; z-index: 50; min-width: 18rem; text-align: right; transition: top 0.15s, right 0.15s; }
  .time-label .descriptor { display: block; font-size: 2.4rem; font-weight: 700; line-height: 1.05; }
  .time-label .ts { display: block; font-size: 1.4rem; opacity: 0.9; margin-top: 0.4rem; font-variant-numeric: tabular-nums; }
  .fs-hint svg { width: 100%; height: 100%; }
  @keyframes fsPulse {
    0%, 100% { opacity: 0.30; transform: scale(0.96); }
    50%      { opacity: 0.75; transform: scale(1.04); }
  }
  .stage:fullscreen .fs-hint { display: none; }
  .stage img { max-width: 100%; max-height: 100%; box-shadow: 0 0 30px #000; }
  .stage:fullscreen { padding: 0; }
  .stage:fullscreen img { max-height: 100vh; max-width: 100vw; box-shadow: none; }
  .img-loader { position: absolute; bottom: 1.25rem; right: 1.25rem; width: 36px; height: 36px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.18); border-top-color: #ffd76a; animation: imgSpin 0.6s linear infinite; opacity: 0; transition: opacity 80ms ease-out; pointer-events: none; z-index: 80; }
  .img-loader.show { opacity: 0.95; }
  @keyframes imgSpin { to { transform: rotate(360deg); } }

  .bottombar { background: #0b0d12; border-top: 2px solid #222; padding: 1.25rem 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .row { display: flex; gap: 1.25rem; align-items: center; }
  .row .slot { flex: 1; min-width: 0; }
  .slabel { font-size: 1.4rem; color: #8ab4ff; min-width: 9rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  button { background: #1f2630; color: #e6e9ef; border: 2px solid #444; padding: 0.9rem 1.6rem; border-radius: 8px; cursor: pointer; font-size: 1.3rem; min-width: 7rem; }
  button:active { background: #2a3340; }
  .ts { font-variant-numeric: tabular-nums; min-width: 22ch; font-size: 1.3rem; }

  .rangebar { width: 100%; }
  .rangebar .ticks { display: flex; justify-content: space-between; font-size: 1.1rem; color: #aab; margin-bottom: 0.4rem; font-variant-numeric: tabular-nums; font-weight: 600; }
  .rangebar .anchors { position: relative; height: 22px; font-size: 0.95rem; color: #99a; font-variant-numeric: tabular-nums; pointer-events: none; }
  .rangebar .anchors span { position: absolute; transform: translateX(-50%); white-space: nowrap; }
  .rangebar .dual { position: relative; height: 48px; touch-action: none; cursor: pointer; }
  .rangebar .track { position: absolute; top: 20px; left: 0; right: 0; height: 8px; background: #1f2630; border-radius: 4px; pointer-events: none; }
  .rangebar .selected { position: absolute; top: 0; height: 100%; background: transparent; border-radius: 4px; box-shadow: 0 -3px 0 #ffd76a, 0 3px 0 #ffd76a; pointer-events: none; }
  .rangebar .daymarks { position: absolute; top: 14px; left: 0; right: 0; height: 20px; pointer-events: none; }
  .rangebar .daymarks span { position: absolute; top: 0; width: 2px; height: 20px; background: #455; }
  .rangebar .thumb { position: absolute; top: 8px; width: 32px; height: 32px; border-radius: 50%; background: var(--thumb-color, #e6e9ef); border: 3px solid #ffd76a; box-shadow: 0 0 0 2px rgba(0,0,0,0.6); transform: translateX(-50%); pointer-events: none; z-index: 2; }
  .rangebar .playhead { position: absolute; top: 2px; width: 6px; height: 44px; background: var(--thumb-color, #ffd76a); border-radius: 3px; box-shadow: 0 0 0 2px #000, 0 0 10px rgba(255,215,106,1); transform: translateX(-50%); pointer-events: none; z-index: 3; }
  .camera-switcher { position: fixed; top: 1rem; right: 1rem; display: flex; flex-direction: column; gap: 0.5rem; z-index: 100; }
  .camera-switcher button { font-size: 1.1rem; padding: 0.7rem 1.2rem; min-width: 0; opacity: 0.7; }
  .camera-switcher button.active { opacity: 1; background: #2a3b5a; border-color: #8ab4ff; }
  .thumb-tooltip { position: fixed; transform: translate(-50%, calc(-100% - 60px)); background: rgba(20,24,32,0.97); color: #e6e9ef; padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 1.4rem; font-weight: 600; white-space: nowrap; pointer-events: none; z-index: 1000; display: none; border: 2px solid #8ab4ff; box-shadow: 0 4px 18px rgba(0,0,0,0.7); font-variant-numeric: tabular-nums; }
  .event-dialog { position: absolute; transform: translate(-50%, -100%) translateY(12px); background: rgba(20,24,32,0.93); color: #fff; padding: 0.7rem 1.2rem; border-radius: 10px; font-size: 1.3rem; font-weight: 600; max-width: 22rem; border: 2px solid #ffd76a; box-shadow: 0 6px 18px rgba(0,0,0,0.7); pointer-events: none; opacity: 0; transition: opacity 0.4s ease-out, transform 0.4s ease-out; z-index: 40; text-align: center; line-height: 1.25; }
  .event-dialog.shown { opacity: 1; transform: translate(-50%, -100%) translateY(0); }
  .event-dialog.fading { opacity: 0; transform: translate(-50%, -100%) translateY(-4px); transition: opacity 1.5s ease-in, transform 1.5s ease-in; }
  .event-dialog::after { content: ''; position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%); border: 8px solid transparent; border-top-color: #ffd76a; }
  .thumb-tooltip.show { display: block; }

  @media (max-width: 768px) {
    body.touch-mode .time-label,
    body.touch-mode .fs-hint { display: none; }
    body.touch-mode .stage:fullscreen .time-label { display: block; }
    body.touch-mode .stage:fullscreen .time-label .descriptor { font-size: 1.6rem; }
    body.touch-mode .stage:fullscreen .time-label .ts { font-size: 1rem; }
    body.touch-mode .stage:fullscreen .time-label { min-width: 0; padding: 0.5rem 0.9rem; }

    body.touch-mode .sidebar { min-width: 9rem; max-width: 11rem; padding: 0.5rem 0 0.5rem 0.5rem; }
    body.touch-mode .sidebar button { font-size: 0.9rem; padding: 0.6rem 0.7rem; }

    body.touch-mode .bottombar { padding: 0.75rem 0.75rem 1rem; gap: 0.75rem; }
    body.touch-mode .slabel { font-size: 1rem; min-width: 5rem; }
    body.touch-mode .row { gap: 0.6rem; }
    body.touch-mode .ts { font-size: 1rem; min-width: 0; }

    body.touch-mode .rangebar .dual { height: 64px; }
    body.touch-mode .rangebar .track { top: 28px; height: 12px; }
    body.touch-mode .rangebar .daymarks { top: 22px; height: 24px; }
    body.touch-mode .rangebar .thumb { top: 10px; width: 44px; height: 44px; }
    body.touch-mode .rangebar .playhead { top: 2px; width: 8px; height: 60px; }
    body.touch-mode .rangebar .anchors { font-size: 0.75rem; }
    body.touch-mode .rangebar .ticks { font-size: 0.85rem; }
  }
</style>
</head>
<body class="{% if touch_mode %}touch-mode{% endif %}">
<div class="camera-switcher" id="cameraSwitcher"></div>
<div class="thumb-tooltip" id="thumbTooltip"></div>
<div class="main">
  <div class="sidebar" id="rangePresets"></div>
  <div class="stage" id="stage">
  <img id="frame" alt="sky">
  <div class="img-loader" id="imgLoader"></div>
  {% if touch_mode %}
  <div class="time-label" aria-hidden="true">
    <span class="descriptor" id="timeDescriptor">--</span>
    <span class="ts" id="timeTs">--</span>
  </div>
  {% endif %}
  <div class="fs-hint" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 9 4 4 9 4"></polyline>
      <polyline points="20 9 20 4 15 4"></polyline>
      <polyline points="4 15 4 20 9 20"></polyline>
      <polyline points="20 15 20 20 15 20"></polyline>
    </svg>
  </div>
</div>
</div>
<div class="bottombar">
  <div class="row">
    <span class="slabel">Timeline</span>
    <div class="slot">
      <div class="rangebar">
        <div class="ticks">
          <span id="rangeStartLabel">--</span>
          <span id="rangeEndLabel">--</span>
        </div>
        <div class="anchors" id="anchorLabels"></div>
        <div class="dual" id="dual">
          <div class="track"><div class="selected" id="selBar"></div></div>
          <div class="daymarks" id="dayMarks"></div>
          <div class="thumb" id="thumbLo"></div>
          <div class="thumb" id="thumbHi"></div>
          <div class="playhead" id="playhead"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    {% if not touch_mode %}<button id="playBtn">Pause</button>{% endif %}
    <span class="ts" id="tsLabel">--</span>
  </div>
</div>
<script src="/static/playback.js"></script>
<script>
const SP = window.SkyPlayback;
const { imgUrl: _imgUrl, readableTs, formatTs, fmtTsHuman, fmtMD, fmt12hm, hhmmToMin,
        describePartOfDay, timeColor, buildGradientFor, frameTimeColor, PreloadCache } = SP;
const SERVER_CAMERA = {% if camera_name %}{{ camera_name | tojson }}{% else %}null{% endif %};
const urlParams = new URLSearchParams(window.location.search);
const CAMERA = SERVER_CAMERA || urlParams.get('camera') || urlParams.get('cam') || '';
const camQS = CAMERA ? `camera=${encodeURIComponent(CAMERA)}` : '';
function withCam(url) {
  if (!CAMERA) return url;
  return url + (url.includes('?') ? '&' : '?') + camQS;
}
function imgUrl(name) { return _imgUrl(name, CAMERA); }
const cache = new PreloadCache({ camera: CAMERA, ahead: 60, behind: 30, cap: 600 });
function preloadAround(i) { cache.around(i, rangeLo, rangeHi); }
const FPS = 10;
const FS_DURATION_MS = 30000;
const IDLE_MS = 120000;

let frames = [];
let idx = 0;
let playing = true;
let timer = null;
let anchors = [];
let sunTimes = {};
let rangeLo = 0;
let rangeHi = 0;
let resetPending = false;
let idleTimer = null;
let fsTimer = null;
let presetActive = false;

const img = document.getElementById('frame');
const imgLoader = document.getElementById('imgLoader');
function setLoading(on) { if (imgLoader) imgLoader.classList.toggle('show', !!on); }
const stage = document.getElementById('stage');
const tsLabel = document.getElementById('tsLabel');
const playBtn = document.getElementById('playBtn');
const TOUCH_MODE = {{ 'true' if touch_mode else 'false' }};
const IS_MOBILE = window.matchMedia('(max-width: 768px)').matches;
const MOBILE_TOUCH = TOUCH_MODE && IS_MOBILE;
function setPlayBtn(text) { if (playBtn) playBtn.textContent = text; }
const dual = document.getElementById('dual');
const thumbLo = document.getElementById('thumbLo');
const thumbHi = document.getElementById('thumbHi');
const playhead = document.getElementById('playhead');
const selBar = document.getElementById('selBar');
const dayMarks = document.getElementById('dayMarks');
const anchorLabels = document.getElementById('anchorLabels');
const rangePresets = document.getElementById('rangePresets');
const thumbTooltip = document.getElementById('thumbTooltip');
const fsHint = document.querySelector('.fs-hint');
const timeDescriptor = document.getElementById('timeDescriptor');
const timeTs = document.getElementById('timeTs');

function updateTimeLabel(iso) {
  if (!timeDescriptor) return;
  const day = iso.slice(0, 10);
  const sun = sunTimes[day];
  timeDescriptor.textContent = describePartOfDay(iso, sun);
  timeTs.textContent = readableTs(iso);
}

const timeLabel = document.querySelector('.time-label');
function positionOverlays() {
  if (document.fullscreenElement) {
    if (timeLabel) {
      timeLabel.style.top = '1.5rem';
      timeLabel.style.right = '1.5rem';
    }
    return;
  }
  const imgRect = img.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  if (imgRect.width === 0) return;
  const topPx = imgRect.top - stageRect.top + 16;
  const rightPx = stageRect.right - imgRect.right + 16;
  if (fsHint) {
    fsHint.style.top = `${topPx}px`;
    fsHint.style.right = `${rightPx}px`;
  }
  if (timeLabel) {
    timeLabel.style.top = `${topPx}px`;
    timeLabel.style.right = `${rightPx + 110 + 16}px`;
  }
}
img.addEventListener('load', positionOverlays);
window.addEventListener('resize', positionOverlays);
document.addEventListener('fullscreenchange', positionOverlays);

function showThumbTooltip(idx, clientX, anchorEl) {
  if (!frames.length) return;
  thumbTooltip.textContent = formatTs(frames[idx].ts);
  const rect = anchorEl.getBoundingClientRect();
  thumbTooltip.style.left = `${clientX}px`;
  thumbTooltip.style.top = `${rect.top}px`;
  thumbTooltip.classList.add('show');
}
function hideThumbTooltip() { thumbTooltip.classList.remove('show'); }
const rangeStartLabel = document.getElementById('rangeStartLabel');
const rangeEndLabel = document.getElementById('rangeEndLabel');

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    (stage.requestFullscreen || stage.webkitRequestFullscreen)?.call(stage);
    clearTimeout(fsTimer);
    if (!MOBILE_TOUCH) {
      fsTimer = setTimeout(() => {
        if (document.fullscreenElement) {
          (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
        }
      }, FS_DURATION_MS);
    }
  } else {
    clearTimeout(fsTimer);
    (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
  }
}

stage.addEventListener('click', toggleFullscreen);

document.addEventListener('keydown', (e) => {
  if (e.key !== 'f' && e.key !== 'F') return;
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'SELECT' || t.tagName === 'TEXTAREA')) return;
  e.preventDefault();
  toggleFullscreen();
});

function resetIdle() {
  if (MOBILE_TOUCH) return;
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { resetPending = true; }, IDLE_MS);
}
if (!MOBILE_TOUCH) {
  ['touchstart', 'click', 'mousemove', 'keydown', 'input'].forEach(ev => {
    window.addEventListener(ev, resetIdle, { passive: true });
  });
  resetIdle();
}

async function loadFrames() {
  const r = await fetch(withCam('/api/frames'));
  const data = await r.json();
  const prevLen = frames.length;
  const wasAtEnd = rangeHi === Math.max(0, prevLen - 1);
  frames = data;
  cache.setFrames(frames);
  const max = Math.max(0, frames.length - 1);
  computeAnchors();
  if (prevLen === 0) {
    rangeLo = 0;
    rangeHi = max;
    idx = max;
  } else if (wasAtEnd) {
    rangeHi = max;
  }
  applyRangeUI();
  buildPresets();
  applyTimelineGradient();
}

function findIdxNearTime(dayIndices, hhmm) {
  const [th, tm] = hhmm.split(':').map(Number);
  const target = th * 60 + tm;
  let best = -1, bestDiff = Infinity;
  for (const i of dayIndices) {
    const [hh, mm] = frames[i].ts.slice(11).split(':').map(Number);
    const diff = Math.abs(hh * 60 + mm - target);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  }
  return bestDiff <= 120 ? best : -1;
}

function applyPreset(lo, hi) {
  rangeLo = lo;
  rangeHi = hi;
  for (const id of [...shownEvents]) {
    const t = eventTimers.get(id);
    if (t) { clearTimeout(t); eventTimers.delete(id); }
    shownEvents.delete(id);
    const el = document.querySelector(`.event-dialog[data-event-id="${id}"]`);
    fadeOutDialog(el);
  }
  applyRangeUI();
  resumeFromStart();
}

const SUNRISE_HEAD = 30;
const SUNRISE_TAIL = 60;
const DAY_PAD = 30;
const SUNSET_HEAD = 30;
const SUNSET_TAIL = 60;
const FRAME_TOL = 60;

function findIdxAtMin(dayIndices, targetMin, tol = FRAME_TOL) {
  let best = -1, bestDiff = Infinity;
  for (const i of dayIndices) {
    const [hh, mm] = frames[i].ts.slice(11).split(':').map(Number);
    const min = hh * 60 + mm;
    const diff = Math.abs(min - targetMin);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  }
  return bestDiff <= tol ? best : -1;
}

let activePresetLabel = null;
function refreshActivePreset() {
  for (const b of rangePresets.querySelectorAll('button')) {
    b.classList.toggle('active', activePresetLabel && b.dataset.label === activePresetLabel);
  }
}
function addPresetButton(label, cls, lo, hi) {
  const btn = document.createElement('button');
  if (cls) btn.className = cls;
  btn.style.whiteSpace = 'pre-line';
  btn.textContent = label;
  btn.dataset.label = label;
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    presetActive = true;
    activePresetLabel = label;
    refreshActivePreset();
    applyPreset(lo, hi);
  });
  btn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
  rangePresets.appendChild(btn);
}

function eventToRange(ev) {
  let lo = -1, hi = -1;
  for (let i = 0; i < frames.length; i++) {
    if (frames[i].ts >= ev.start_ts) { lo = i; break; }
  }
  for (let i = frames.length - 1; i >= 0; i--) {
    if (frames[i].ts <= ev.end_ts) { hi = i; break; }
  }
  if (lo < 0 || hi < 0 || lo > hi) return null;
  return { lo, hi };
}

function buildPresets() {
  rangePresets.innerHTML = '';
  if (!frames.length) return;

  const allBtn = document.createElement('button');
  allBtn.className = 'preset-everything';
  allBtn.textContent = 'Everything';
  allBtn.addEventListener('click', (e) => { e.stopPropagation(); applyPreset(0, frames.length - 1); });
  allBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
  rangePresets.appendChild(allBtn);

  const byDay = {};
  frames.forEach((f, i) => {
    const day = f.ts.slice(0, 10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(i);
  });
  const days = Object.keys(byDay).sort();
  const todayKey = days[days.length - 1];

  const chrono = [];
  for (let di = 0; di < days.length; di++) {
    const day = days[di];
    const dayIdx = byDay[day];
    const sun = sunTimes[day] || {};
    const sr = sun.sunrise ? hhmmToMin(sun.sunrise) : null;
    const ss = sun.sunset  ? hhmmToMin(sun.sunset)  : null;
    const md = fmtMD(day);

    if (sr !== null) {
      const lo = findIdxAtMin(dayIdx, sr - SUNRISE_HEAD);
      const hi = findIdxAtMin(dayIdx, sr + SUNRISE_TAIL);
      if (lo >= 0 && hi >= 0 && lo < hi) chrono.push({ label: `${md} sunrise`, cls: 'preset-sunrise', lo, hi });
    }
    if (sr !== null || ss !== null) {
      const tryLo = sr !== null ? findIdxAtMin(dayIdx, sr + SUNRISE_TAIL, 240) : -1;
      const tryHi = ss !== null ? findIdxAtMin(dayIdx, ss - DAY_PAD, 240) : -1;
      const lo = tryLo >= 0 ? tryLo : dayIdx[0];
      const hi = tryHi >= 0 ? tryHi : dayIdx[dayIdx.length - 1];
      if (lo < hi) chrono.push({ label: `${md} day`, cls: 'preset-day', lo, hi });
    }
    if (ss !== null) {
      const lo = findIdxAtMin(dayIdx, ss - SUNSET_HEAD);
      const hi = findIdxAtMin(dayIdx, ss + SUNSET_TAIL);
      if (lo >= 0 && hi >= 0 && lo < hi) chrono.push({ label: `${md} sunset`, cls: 'preset-sunset', lo, hi });
    }
    if (di < days.length - 1) {
      const nextDay = days[di + 1];
      const sunNext = sunTimes[nextDay] || {};
      const srNext = sunNext.sunrise ? hhmmToMin(sunNext.sunrise) : null;
      if (ss !== null && srNext !== null) {
        const lo = findIdxAtMin(dayIdx, ss + SUNSET_TAIL);
        const hi = findIdxAtMin(byDay[nextDay], srNext - SUNRISE_HEAD);
        if (lo >= 0 && hi >= 0 && lo < hi) chrono.push({ label: `Night ${md} → ${fmtMD(nextDay)}`, cls: 'preset-night', lo, hi });
      }
    }
  }
  for (const ev of events) {
    const r = eventToRange(ev);
    if (!r) continue;
    const md = fmtMD(ev.start_ts.slice(0, 10));
    const msg = ev.message.length > 24 ? ev.message.slice(0, 21) + '…' : ev.message;
    chrono.push({ label: `★ ${md}\n${msg}`, cls: 'preset-event', lo: r.lo, hi: r.hi });
  }
  chrono.sort((a, b) => a.lo - b.lo);
  for (const b of chrono) addPresetButton(b.label, b.cls, b.lo, b.hi);

  if (sunTimes[todayKey]?.sunrise) {
    const sr = hhmmToMin(sunTimes[todayKey].sunrise);
    const srIdx = findIdxAtMin(byDay[todayKey], sr - SUNRISE_HEAD, 240);
    if (srIdx >= 0) addPresetButton(`Today (${fmtMD(todayKey)})\nsunrise → NOW`, 'preset-today', srIdx, frames.length - 1);
  }

  const lastTsMs = new Date(frames[frames.length - 1].ts).getTime();
  const targetMs = lastTsMs - 60 * 60 * 1000;
  let hourIdx = 0;
  for (let i = frames.length - 1; i >= 0; i--) {
    if (new Date(frames[i].ts).getTime() <= targetMs) { hourIdx = i; break; }
  }
  if (hourIdx < frames.length - 1) {
    const startLabel = fmt12hm(frames[hourIdx].ts.slice(11, 16));
    addPresetButton(`Last hour\n${startLabel} → NOW`, 'preset-today', hourIdx, frames.length - 1);
  }

  refreshActivePreset();
}

function applyTimelineGradient() {
  const track = document.querySelector('.rangebar .track');
  if (track) track.style.background = buildGradientFor(frames, 0, frames.length - 1);
}
function frameToPct(i) {
  const total = Math.max(1, frames.length - 1);
  return (Math.max(0, Math.min(total, i)) / total) * 100;
}
function renderThumbs() {
  if (!frames.length) return;
  thumbLo.style.left = frameToPct(rangeLo) + '%';
  thumbHi.style.left = frameToPct(rangeHi) + '%';
  playhead.style.left = frameToPct(idx) + '%';
  thumbLo.style.setProperty('--thumb-color', frameTimeColor(frames, rangeLo));
  thumbHi.style.setProperty('--thumb-color', frameTimeColor(frames, rangeHi));
  playhead.style.setProperty('--thumb-color', frameTimeColor(frames, idx));
}
function updateThumbColors() { renderThumbs(); }

let events = [];
const shownEvents = new Set();

async function loadEvents() {
  try {
    const r = await fetch(withCam('/api/events'));
    events = await r.json();
    if (frames.length) { computeAnchors(); buildPresets(); }
  } catch (e) { console.warn('events load failed', e); }
}

const EVENT_VISIBLE_MS = 10000;
const EVENT_FADE_OUT_MS = 1500;
const eventTimers = new Map();
let eventsInitialized = false;

function fadeOutDialog(el) {
  if (!el || el.classList.contains('fading')) return;
  el.classList.remove('shown');
  el.classList.add('fading');
  setTimeout(() => el.remove(), EVENT_FADE_OUT_MS + 100);
}

function positionDialog(dialog, ev) {
  const imgRect = img.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  const xpx = imgRect.left - stageRect.left + ev.x_pct * imgRect.width;
  const ypx = imgRect.top - stageRect.top + ev.y_pct * imgRect.height;
  dialog.style.left = `${xpx}px`;
  dialog.style.top = `${ypx - 16}px`;
}
function repositionAllDialogs() {
  for (const d of stage.querySelectorAll('.event-dialog')) {
    const ev = events.find(e => e.id === d.dataset.eventId);
    if (ev) positionDialog(d, ev);
  }
}
window.addEventListener('resize', repositionAllDialogs);
document.addEventListener('fullscreenchange', repositionAllDialogs);

function spawnEventDialog(ev) {
  const dialog = document.createElement('div');
  dialog.className = 'event-dialog';
  dialog.dataset.eventId = ev.id;
  dialog.textContent = ev.message;
  positionDialog(dialog, ev);
  stage.appendChild(dialog);
  requestAnimationFrame(() => dialog.classList.add('shown'));
  const t = setTimeout(() => {
    fadeOutDialog(dialog);
    eventTimers.delete(ev.id);
  }, EVENT_VISIBLE_MS);
  eventTimers.set(ev.id, t);
}

function renderActiveEvents() {
  if (!events.length || !frames.length) return;
  const ts = frames[idx].ts;
  const tMs = Date.parse(ts);
  const active = new Set();
  for (const ev of events) {
    const sMs = Date.parse(ev.start_ts);
    const eMs = Date.parse(ev.end_ts);
    if (isNaN(tMs) || isNaN(sMs) || isNaN(eMs)) continue;
    if (tMs >= sMs && tMs <= eMs) {
      active.add(ev.id);
      if (!shownEvents.has(ev.id)) {
        if (eventsInitialized) spawnEventDialog(ev);
        shownEvents.add(ev.id);
      }
    }
  }
  for (const id of [...shownEvents]) {
    if (!active.has(id)) {
      const t = eventTimers.get(id);
      if (t) { clearTimeout(t); eventTimers.delete(id); }
      shownEvents.delete(id);
      const el = document.querySelector(`.event-dialog[data-event-id="${id}"]`);
      fadeOutDialog(el);
    }
  }
  eventsInitialized = true;
}

async function loadSunTimes() {
  try {
    const r = await fetch(withCam('/api/anchors'));
    const data = await r.json();
    sunTimes = {};
    for (const d of data) sunTimes[d.day] = { sunrise: d.sunrise, sunset: d.sunset };
  } catch (e) { console.warn('sun times failed', e); }
}

function computeAnchors() {
  anchors = [];
  if (!frames.length) { renderAnchors(); return; }
  const byDay = {};
  frames.forEach((f, i) => {
    const day = f.ts.slice(0, 10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push({ i, ts: f.ts });
  });
  for (const day of Object.keys(byDay)) {
    const monthDay = day.slice(5);
    const sun = sunTimes[day] || {};
    const targets = [{ time: '00:00', suffix: '' }];
    if (sun.sunrise) targets.push({ time: sun.sunrise, suffix: ` sunrise ${fmt12hm(sun.sunrise)}` });
    if (sun.sunset) targets.push({ time: sun.sunset, suffix: ` sunset ${fmt12hm(sun.sunset)}` });
    for (const t of targets) {
      const [th, tm] = t.time.split(':').map(Number);
      const targetMin = th * 60 + tm;
      let best = null, bestDiff = Infinity;
      for (const f of byDay[day]) {
        const [hh, mm] = f.ts.slice(11).split(':').map(Number);
        const min = hh * 60 + mm;
        const diff = Math.abs(min - targetMin);
        if (diff < bestDiff) { bestDiff = diff; best = f; }
      }
      if (best && bestDiff <= 120) {
        anchors.push({ idx: best.i, label: monthDay + t.suffix });
      }
    }
  }
  for (const ev of events) {
    const r = eventToRange(ev);
    if (!r) continue;
    anchors.push({ idx: r.lo, label: '★', kind: 'event', title: ev.message });
  }
  anchors.sort((a, b) => a.idx - b.idx);
  renderAnchors();
}

function renderAnchors() {
  dayMarks.innerHTML = '';
  anchorLabels.innerHTML = '';
  if (frames.length < 2) return;
  const total = frames.length - 1;
  for (const a of anchors) {
    const pct = (a.idx / total) * 100;
    const m = document.createElement('span');
    m.style.left = `${pct}%`;
    if (a.kind === 'event') m.classList.add('event-mark');
    dayMarks.appendChild(m);
    const lbl = document.createElement('span');
    lbl.style.left = `${pct}%`;
    lbl.textContent = a.label;
    if (a.kind === 'event') lbl.classList.add('event-anchor');
    if (a.title) lbl.title = `${a.title} — ${frames[a.idx].ts.replace('T', ' ')}`;
    anchorLabels.appendChild(lbl);
  }
}

function snapToDay(val) {
  if (frames.length < 2) return val;
  const tol = Math.max(2, Math.floor(frames.length * 0.01));
  for (const a of anchors) {
    if (Math.abs(val - a.idx) <= tol) return a.idx;
  }
  return val;
}

function applyRangeUI() {
  if (frames.length < 2) {
    selBar.style.left = '0%';
    selBar.style.width = '100%';
    rangeStartLabel.textContent = '--';
    rangeEndLabel.textContent = '--';
    return;
  }
  const total = frames.length - 1;
  const loPct = (rangeLo / total) * 100;
  const hiPct = (rangeHi / total) * 100;
  selBar.style.left = `${loPct}%`;
  selBar.style.width = `${hiPct - loPct}%`;
  rangeStartLabel.textContent = fmtTsHuman(frames[rangeLo].ts);
  const atCurrent = rangeHi === frames.length - 1;
  rangeEndLabel.textContent = atCurrent
    ? `NOW (${fmtTsHuman(frames[rangeHi].ts)})`
    : fmtTsHuman(frames[rangeHi].ts);
  rangeEndLabel.style.color = atCurrent ? '#7fd17a' : '#aab';
  if (idx < rangeLo) idx = rangeLo;
  if (idx > rangeHi) idx = rangeHi;
  renderThumbs();
  preloadAround(idx);
}

function resumeFromStart() {
  idx = rangeLo;
  show(idx);
  playing = true;
  setPlayBtn('Pause');
}

function pointerToFrame(clientX) {
  const rect = dual.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  return Math.round(pct * Math.max(0, frames.length - 1));
}

let activeDrag = null;

function pickActive(clientX) {
  const r = dual.getBoundingClientRect();
  const total = Math.max(1, frames.length - 1);
  const xLo = r.left + (rangeLo / total) * r.width;
  const xHi = r.left + (rangeHi / total) * r.width;
  const xPh = r.left + (idx / total) * r.width;
  const HIT = 36;
  const cands = [
    ['playhead', Math.abs(clientX - xPh)],
    ['lo', Math.abs(clientX - xLo)],
    ['hi', Math.abs(clientX - xHi)],
  ].sort((a, b) => a[1] - b[1]);
  return cands[0][1] <= HIT ? cands[0][0] : 'playhead';
}

function updateDrag(clientX) {
  if (!activeDrag || !frames.length) return;
  let v = snapToDay(pointerToFrame(clientX));
  v = Math.max(0, Math.min(frames.length - 1, v));
  if (activeDrag === 'lo') {
    rangeLo = Math.min(v, Math.max(0, rangeHi - 1));
    if (idx < rangeLo) idx = rangeLo;
  } else if (activeDrag === 'hi') {
    rangeHi = Math.max(v, Math.min(frames.length - 1, rangeLo + 1));
    if (idx > rangeHi) idx = rangeHi;
  } else {
    if (v < rangeLo) rangeLo = v;
    if (v > rangeHi) rangeHi = v;
    idx = v;
  }
  applyRangeUI();
  show(idx);
  const anchor = activeDrag === 'lo' ? rangeLo : activeDrag === 'hi' ? rangeHi : idx;
  showThumbTooltip(anchor, clientX, dual);
}

dual.addEventListener('pointerdown', (e) => {
  if (!frames.length) return;
  e.preventDefault();
  e.stopPropagation();
  try { dual.setPointerCapture(e.pointerId); } catch {}
  activeDrag = pickActive(e.clientX);
  playing = false;
  setPlayBtn('Play');
  updateDrag(e.clientX);

  const onMove = (ev) => updateDrag(ev.clientX);
  const onUp = () => {
    activeDrag = null;
    hideThumbTooltip();
    dual.removeEventListener('pointermove', onMove);
    dual.removeEventListener('pointerup', onUp);
    dual.removeEventListener('pointercancel', onUp);
    playing = true;
    setPlayBtn('Pause');
  };
  dual.addEventListener('pointermove', onMove);
  dual.addEventListener('pointerup', onUp);
  dual.addEventListener('pointercancel', onUp);
});

function show(i) {
  if (!frames.length) return;
  idx = Math.max(rangeLo, Math.min(rangeHi, i));
  const f = frames[idx];
  img.src = imgUrl(f.name);
  if (img.complete && img.naturalWidth > 0) setLoading(false);
  else setLoading(true);
  tsLabel.textContent = fmtTsHuman(f.ts);
  renderThumbs();
  updateTimeLabel(f.ts);
  renderActiveEvents();
  preloadAround(idx);
}

img.addEventListener('load', () => setLoading(false));
img.addEventListener('error', () => setLoading(false));

function findAnchorFor(day, kind) {
  const sun = sunTimes[day];
  if (!sun || !sun[kind]) return -1;
  const [th, tm] = sun[kind].split(':').map(Number);
  let target = th * 60 + tm;
  if (kind === 'sunrise') target -= SUNRISE_HEAD;
  let best = -1, bestDiff = Infinity;
  for (let i = 0; i < frames.length; i++) {
    if (frames[i].ts.slice(0, 10) !== day) continue;
    const [hh, mm] = frames[i].ts.slice(11).split(':').map(Number);
    const diff = Math.abs(hh * 60 + mm - target);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  }
  return bestDiff <= 120 ? best : -1;
}

function applyIdleReset() {
  if (!frames.length) return;
  const today = frames[frames.length - 1].ts.slice(0, 10);
  const days = Object.keys(sunTimes).sort();
  const todayIdx = days.indexOf(today);
  const yesterday = todayIdx > 0 ? days[todayIdx - 1] : null;
  let anchor = findAnchorFor(today, 'sunrise');
  let anchorDay = today;
  if (anchor < 0 && yesterday) { anchor = findAnchorFor(yesterday, 'sunrise'); anchorDay = yesterday; }
  if (anchor < 0) anchor = 0;
  presetActive = true;
  activePresetLabel = `Today (${fmtMD(anchorDay)})\nsunrise → NOW`;
  refreshActivePreset();
  rangeLo = anchor;
  rangeHi = frames.length - 1;
  applyRangeUI();
  idx = rangeLo;
  show(idx);
  playing = true;
  setPlayBtn('Pause');
}

function tick() {
  if (!playing || !frames.length) return;
  const next = idx >= rangeHi ? rangeLo : idx + 1;
  if (!cache.ready(next)) { setLoading(true); preloadAround(next); return; }
  if (idx >= rangeHi) {
    if (resetPending) {
      resetPending = false;
      applyIdleReset();
      return;
    }
    idx = rangeLo;
  } else {
    idx++;
  }
  show(idx);
}

function restartTimer() {
  if (timer) clearInterval(timer);
  timer = setInterval(tick, 1000 / FPS);
}

if (playBtn) {
  playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    playing = !playing;
    setPlayBtn(playing ? 'Pause' : 'Play');
  });
}

[playBtn].filter(Boolean).forEach(el => {
  el.addEventListener('click', e => e.stopPropagation());
  el.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
});

async function buildCameraSwitcher() {
  try {
    const r = await fetch('/api/cameras');
    const data = await r.json();
    const cams = data.cameras || [];
    const def = data.default;
    if (cams.length <= 1) return;
    const container = document.getElementById('cameraSwitcher');
    container.innerHTML = '';
    const active = CAMERA || def;
    for (const name of cams) {
      const btn = document.createElement('button');
      btn.textContent = name;
      if (name === active) btn.classList.add('active');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (name === active) return;
        const base = window.location.pathname.startsWith('/touch') ? '/touch' : '/live';
        window.location.href = `${base}/${encodeURIComponent(name)}`;
      });
      btn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
      container.appendChild(btn);
    }
  } catch (e) { console.warn('camera switcher failed', e); }
}

(async () => {
  await buildCameraSwitcher();
  await loadSunTimes();
  await loadFrames();
  await loadEvents();
  if (TOUCH_MODE && frames.length) applyIdleReset();
  if (frames.length) show(idx);
  restartTimer();
  setInterval(async () => { await loadSunTimes(); await loadFrames(); await loadEvents(); }, 30000);
})();
</script>
